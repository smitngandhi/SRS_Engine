name: Deploy SRS Engine to Hugging Face Spaces

on:
  push:
    branches: [ production_worker ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.23.0"

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: Smit1002
          HF_SPACE_NAME: specforge-worker-2
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi()
          url = api.upload_folder(
              folder_path=".",
              repo_id=f"{os.environ['HF_USERNAME']}/{os.environ['HF_SPACE_NAME']}",
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              commit_message=f"Deploy from GitHub Actions",
              ignore_patterns=[
                # User-generated runtime artifacts
                "srs_engine/static/diagrams/**",

                # Python cache
                "**/__pycache__/**",
                "**/*.pyc",
                "**/*.pyo",

                # Virtual envs
                ".venv/**",
                "venv/**",
                "env/**",

                # Secrets
                ".env",

                # CI/CD
                ".github/**",

                # Dev markdown docs (keep README.md)
                "COMPREHENSIVE_FEATURES.md",
                "DETAILED_PROJECT_BUCKETS_DIAGRAM_STUDIO.md",
                "LOGGING_AUDIT.md",
                "LOGGING_IMPLEMENTATION.md",
                "LOGGING_QUICK_REF.md",
                "LOGGING_TESTING_GUIDE.md",
                "PLAN_UPGRADER.md",
                "PROJECT_BUCKETS_AND_DIAGRAM_STUDIO.md",
                "STARTUP.md",
                "api.md",
                "backend_steps.md",
                "changes.md",
                "code-review-graph-workflow-1.md",
                "deployment_plan.md",
                "file_tree.md",
                "frontend_steps.md",
                "implementation_plan.md",
                "overall.md",
                "start.md",
                "startup_guide.md",
                "wiki.md",

                # Dev text files (keep requirements.txt)
                "llm-context.txt",
                "presentation.txt",

                # Bat/shell dev scripts
                "*.bat",
                "*.mmd",
                "checklist",

                # Temp/debug scripts
                "temp.py",
                "check_syntax.py",
                "admin_summary.py",
                "test_mongo.py",

                # Dev screenshots at root
                "image.png",
                "image-*.png",
                "srs_engine_sequence.png",

                # Misc
                ".repomixignore",
                "puppeteer-config.json",
                "new-horizontal-plan.html",
                ".pytest_cache/**",
            ]
          )
          print(f"✅ Deployed: {url}")
          EOF